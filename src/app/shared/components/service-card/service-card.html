<div class="card">

    <div class="service-icon">
        @switch(service.icon) {

        @case('code-2') {
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6" />
            <polyline points="8 6 2 12 8 18" />
        </svg>
        }

        @case('network') {
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="4" rx="1" />
            <rect x="2" y="10" width="6" height="4" rx="1" />
            <rect x="16" y="10" width="6" height="4" rx="1" />
            <rect x="9" y="18" width="6" height="4" rx="1" />
            <line x1="12" y1="6" x2="12" y2="10" />
            <line x1="5" y1="14" x2="5" y2="18" />
            <line x1="19" y1="14" x2="19" y2="18" />
            <line x1="5" y1="18" x2="12" y2="18" />
            <line x1="19" y1="18" x2="12" y2="18" />
        </svg>
        }

        @case('headset') {
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path
                d="M3 5a2 2 0 0 1 2-2h2.5a1 1 0 0 1 .95.68l1.1 3.3a1 1 0 0 1-.23 1.02L8 9.35A11 11 0 0 0 14.65 16l1.35-1.32a1 1 0 0 1 1.02-.23l3.3 1.1A1 1 0 0 1 21 16.5V19a2 2 0 0 1-2 2h-1C9.16 21 3 14.84 3 7V5z" />
            <path d="M15 2s2 0 4 2-2 4-2 4" />
            <circle cx="18" cy="5" r="1" fill="currentColor" />
        </svg>
        }

        @case('cloud') {
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 0 1 0 9z" />
        </svg>
        }

        @case('shield-check') {
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            <polyline points="9 12 11 14 15 10" />
        </svg>
        }

        @case('smartphone') {
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2" />
            <line x1="12" y1="18" x2="12.01" y2="18" stroke-width="2.5" stroke-linecap="round" />
        </svg>
        }

        }
    </div>

    <h3>

        {{ service.title }}

    </h3>

    <p>

        {{ service.description }}

    </p>

    <a href="#">

        Conocer más →

    </a>

</div>
