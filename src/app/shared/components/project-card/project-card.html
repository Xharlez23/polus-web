<div class="project-card">

    <img
        [src]="project.image"
        [alt]="project.title">

    <div class="content">

        <h3>

            {{project.title}}

        </h3>

        <p>

            {{project.description}}

        </p>

        <div class="tags">

            @for(item of project.technologies; track item){

                <span>

                    {{item}}

                </span>

            }

        </div>

        <div class="buttons">

            @if(project.demo){

                <a [href]="project.demo" target="_blank">

                    Ver Demo

                </a>

            }

            @if(project.github){

                <a [href]="project.github" target="_blank">

                    GitHub

                </a>

            }

        </div>

    </div>

</div>
